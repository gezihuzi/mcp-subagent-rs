name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format Check
        run: cargo fmt --check

      - name: Test
        run: cargo test --all-targets --locked

      - name: Validate Example Specs
        run: cargo run --locked -- --agents-dir examples/agents validate

      - name: v0.8 Release Smoke
        run: ./scripts/smoke_v08.sh
